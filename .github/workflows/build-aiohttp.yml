name: Build aiohttp Android Wheels

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'aiohttp version tag to build (e.g., 3.13.5)'
        required: true
        default: '3.13.5'

jobs:
  build-android-wheels:
    name: Build Android Wheels
    runs-on: ubuntu-latest
    
    steps:
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel

      - name: Download and Unpack Sdist
        run: |
          # Download the specific source distribution
          pip download --no-binary :all: --no-deps aiohttp==${{ inputs.version }}
          # Unpack it (the filename is usually aiohttp-X.X.X.tar.gz)
          tar -xvf aiohttp-${{ inputs.version }}.tar.gz
          # Move contents to current dir so cibuildwheel finds it
          mv aiohttp-${{ inputs.version }}/* .

      - name: Build Android Wheels
        env:
          CIBW_PLATFORM: android
          # Correct Android ABI naming convention
          CIBW_ARCHS_ANDROID: arm64_v8a 
          
          CIBW_TEST_SKIP: "*android*"
          CIBW_BUILD_FRONTEND: build
          
        run: python -m cibuildwheel --output-dir wheelhouse

      - name: Upload Wheels
        uses: actions/upload-artifact@v4
        with:
          name: aiohttp-${{ inputs.version }}-android-wheels
          path: ./wheelhouse/*.whl
