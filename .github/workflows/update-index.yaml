name: Update Simple Index

on:
  workflow_run:
    workflows: ["Build Android Wheels"]
    types: [completed]

  workflow_dispatch:

  schedule:
    - cron: '0 7 * * 1'

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_branch || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-index:
    name: Rebuild PEP 503 Index
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == github.event.repository.default_branch
      )

    steps:
      - uses: actions/checkout@v6

      - name: Generate simple index from all releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/generate_simple_index.py

      - name: Checkout current gh-pages content
        uses: actions/checkout@v6
        continue-on-error: true
        with:
          ref: gh-pages
          path: existing-pages

      - name: Detect index changes
        id: detect-changes
        shell: bash
        run: |
          if [[ ! -d existing-pages ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if diff -qr gh-pages-index existing-pages > /dev/null; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Generated index is unchanged."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Generated index differs from gh-pages."
          fi

      - name: Deploy index to GitHub Pages
        if: steps.detect-changes.outputs.changed == 'true'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: gh-pages-index
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'chore: rebuild wheel index (run ${{ github.run_number }} @ ${{ github.sha }})'
