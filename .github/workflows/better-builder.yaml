name: Build Android Wheels

on:
  schedule:
    - cron: '0 6 * * *'   # daily: check all packages for new PyPI releases

  workflow_dispatch:
    inputs:
      package:
        description: 'Package name to build (leave blank to check all in packages.toml)'
        required: false
        default: ''
      version:
        description: 'Exact version (only used with package input; blank = latest)'
        required: false
        default: ''
      force_rebuild:
        description: 'Rebuild even if release already exists'
        required: false
        default: false
        type: boolean

concurrency:
  group: build-android-wheels
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # 1. Resolve: check each package against existing releases, emit build matrix
  # ───────────────────────────────────────────────────────────────────────────
  resolve:
    name: Resolve
    runs-on: ubuntu-latest
    outputs:
      matrix:       ${{ steps.resolve.outputs.matrix }}
      any_to_build: ${{ steps.resolve.outputs.any_to_build }}

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: false

      - name: Run resolve.py
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          uv run resolve.py \
            ${{ inputs.package && format('--package "{0}"', inputs.package) || '' }} \
            ${{ inputs.version && format('--version "{0}"', inputs.version) || '' }} \
            ${{ inputs.force_rebuild == true && '--force' || '' }}

  # ───────────────────────────────────────────────────────────────────────────
  # 2. Build: one job per (package x arch)
  # ───────────────────────────────────────────────────────────────────────────
  build:
    name: ${{ matrix.pkg.name }} ${{ matrix.pkg.version }} / ${{ matrix.arch }}
    needs: resolve
    if: needs.resolve.outputs.any_to_build == 'true'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        pkg:  ${{ fromJson(needs.resolve.outputs.matrix).include }}
        arch: [arm64_v8a, x86_64]

    steps:
      - if: matrix.pkg.name == '__skip__'
        run: echo "Nothing to build." && exit 0

      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: false

      - name: Install cibuildwheel
        run: uv tool install cibuildwheel

      - name: Cache built wheel
        id: wheel-cache
        uses: actions/cache@v5
        with:
          path: wheelhouse
          key: wheel-android-${{ matrix.arch }}-${{ matrix.pkg.name }}-${{ matrix.pkg.version }}-cp313-cp314

      - name: Download and unpack sdist
        if: steps.wheel-cache.outputs.cache-hit != 'true'
        run: |
          PKG="${{ matrix.pkg.name }}"
          VER="${{ matrix.pkg.version }}"
          pip download --no-binary :all: --no-deps "${PKG}==${VER}"
          # Handle any normalization of filenames (- vs _)
          SDIST=$(ls *.tar.gz *.zip 2>/dev/null | head -1)
          if [[ "$SDIST" == *.tar.gz ]]; then
            tar -xf "$SDIST"
          elif [[ "$SDIST" == *.zip ]]; then
            unzip -q "$SDIST"
          fi
          SRCDIR=$(ls -d */ | head -1)
          shopt -s dotglob
          mv "${SRCDIR}"* . 2>/dev/null || true
          rmdir "$SRCDIR" 2>/dev/null || true

      - name: Build wheel
        if: steps.wheel-cache.outputs.cache-hit != 'true'
        env:
          CIBW_PLATFORM:              android
          CIBW_ARCHS_ANDROID:         ${{ matrix.arch }}
          CIBW_BUILD_FRONTEND:        build
          CIBW_TEST_SKIP:             '*'
          CIBW_ENVIRONMENT_ANDROID:   ${{ matrix.pkg.cibw_environment || '' }}
          CIBW_BEFORE_BUILD_ANDROID:  ${{ matrix.pkg.cibw_before_build || '' }}
          ANDROID_API_LEVEL:          '24'
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ matrix.pkg.version }}
        run: cibuildwheel --output-dir wheelhouse

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.pkg.name }}-${{ matrix.pkg.version }}-android-${{ matrix.arch }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  # ───────────────────────────────────────────────────────────────────────────
  # 3. Publish: create a GitHub Release per package
  # ───────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish ${{ matrix.pkg.name }} ${{ matrix.pkg.version }}
    needs: [resolve, build]
    if: needs.resolve.outputs.any_to_build == 'true'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        pkg: ${{ fromJson(needs.resolve.outputs.matrix).include }}

    steps:
      - if: matrix.pkg.name == '__skip__'
        run: echo "Nothing to publish." && exit 0

      - name: Download wheels for ${{ matrix.pkg.name }}
        uses: actions/download-artifact@v8
        with:
          path: dist/
          pattern: ${{ matrix.pkg.name }}-${{ matrix.pkg.version }}-android-*
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PKG="${{ matrix.pkg.name }}"
          VER="${{ matrix.pkg.version }}"
          TAG="${{ matrix.pkg.tag }}"

          BODY="| ABI | Target |
          |---|---|
          | \`arm64_v8a\` | Physical devices (Android 7+, API 24) |
          | \`x86_64\`    | Emulators |

          Python: **CP3.13**, **CP3.14**

          Built from PyPI sdist by GitHub Actions.
          "

          gh release create "$TAG" dist/*.whl \
            --repo "$GITHUB_REPOSITORY" \
            --title "${PKG} ${VER} — Android wheels" \
            --notes "$BODY" \
          || gh release upload "$TAG" dist/*.whl \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
