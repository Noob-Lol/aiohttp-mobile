name: Build Android Wheels

on:
  schedule:
    - cron: '0 6 * * *'   # daily: check all packages for new PyPI releases

  workflow_dispatch:
    inputs:
      package:
        description: 'Package name to build (leave blank to check all in packages.toml)'
        required: false
        default: ''
      version:
        description: 'Exact version (only used with package input; blank = latest)'
        required: false
        default: ''
      force_rebuild:
        description: 'Rebuild even if release already exists'
        required: false
        default: false
        type: boolean

env:
  WHEEL_PY_TAGS: cp313-cp314

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # 1. Resolve: check each package against existing releases, emit build matrix
  # ───────────────────────────────────────────────────────────────────────────
  resolve:
    name: Resolve
    runs-on: ubuntu-latest
    outputs:
      matrix:       ${{ steps.resolve.outputs.matrix }}
      any_to_build: ${{ steps.resolve.outputs.any_to_build }}

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: false

      - name: Run resolve.py
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INPUT_PACKAGE: ${{ github.event.inputs.package || '' }}
          INPUT_VERSION: ${{ github.event.inputs.version || '' }}
          INPUT_FORCE_REBUILD: ${{ github.event_name == 'workflow_dispatch' && inputs.force_rebuild == true }}
        run: |
          args=()
          if [[ -n "$INPUT_PACKAGE" ]]; then
            args+=(--package "$INPUT_PACKAGE")
          fi
          if [[ -n "$INPUT_VERSION" ]]; then
            args+=(--version "$INPUT_VERSION")
          fi
          if [[ "$INPUT_FORCE_REBUILD" == "true" ]]; then
            args+=(--force)
          fi
          uv run scripts/resolve.py "${args[@]}"

  # ───────────────────────────────────────────────────────────────────────────
  # 2. Build: one job per (package x arch)
  # ───────────────────────────────────────────────────────────────────────────
  build:
    name: ${{ matrix.pkg.name }} ${{ matrix.pkg.version }} / ${{ matrix.arch }}
    needs: resolve
    if: needs.resolve.outputs.any_to_build == 'true'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        pkg:  ${{ fromJson(needs.resolve.outputs.matrix).include }}
        arch: [arm64_v8a, x86_64]

    steps:
      - if: matrix.pkg.name == '__skip__'
        run: echo "Nothing to build." && exit 0

      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: false

      - name: Install cibuildwheel
        run: uv tool install cibuildwheel

      - name: Cache built wheel
        id: wheel-cache
        uses: actions/cache@v5
        with:
          path: wheelhouse
          key: wheel-android-${{ matrix.arch }}-${{ matrix.pkg.name }}-${{ matrix.pkg.version }}-${{ env.WHEEL_PY_TAGS }}

      - name: Download and unpack sdist
        if: steps.wheel-cache.outputs.cache-hit != 'true' || (github.event_name == 'workflow_dispatch' && inputs.force_rebuild == true)
        run: |
         PKG="${{ matrix.pkg.name }}"
         VER="${{ matrix.pkg.version }}"
         mkdir -p work/dist work/src
         uv run scripts/download_sdist.py "$PKG" "$VER" -d work/dist
         tar -xf work/dist/*.tar.gz -C work/src
         SRCDIR=$(ls -d work/src/*/ | head -1)
         echo "SDIST_SOURCE_DIR=${SRCDIR%/}" >> "$GITHUB_ENV"

      - name: Patch sdist
        if: matrix.pkg.patch != '' && (steps.wheel-cache.outputs.cache-hit != 'true' || (github.event_name == 'workflow_dispatch' && inputs.force_rebuild == true))
        env:
          PATCH: ${{ matrix.pkg.patch }}
        run: |
          PATCH="${PATCH//\{project\}/$SDIST_SOURCE_DIR}"
          echo "Applying patch: $PATCH"
          bash -c "$PATCH"

      - name: Build wheel
        if: steps.wheel-cache.outputs.cache-hit != 'true' || (github.event_name == 'workflow_dispatch' && inputs.force_rebuild == true)
        env:
          CIBW_PLATFORM:              android
          CIBW_ARCHS_ANDROID:         ${{ matrix.arch }}
          CIBW_BUILD_FRONTEND:        build[uv]
          CIBW_TEST_SKIP:             '*'
          CIBW_ENVIRONMENT_ANDROID:   ${{ matrix.pkg.cibw_environment || '' }}
          CIBW_BEFORE_BUILD_ANDROID:  ${{ matrix.pkg.cibw_before_build || '' }}
          ANDROID_API_LEVEL:          '24'
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ matrix.pkg.version }}
        run: |
          cd "$SDIST_SOURCE_DIR"
          cibuildwheel --output-dir "$GITHUB_WORKSPACE/wheelhouse"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.pkg.name }}-${{ matrix.pkg.version }}-android-${{ matrix.arch }}
          path: wheelhouse/*.whl
          if-no-files-found: error

  # ───────────────────────────────────────────────────────────────────────────
  # 3. Publish: create a GitHub Release per package
  # ───────────────────────────────────────────────────────────────────────────
  publish:
    name: Publish ${{ matrix.pkg.name }} ${{ matrix.pkg.version }}
    needs: [resolve, build]
    if: always() && needs.resolve.outputs.any_to_build == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        pkg: ${{ fromJson(needs.resolve.outputs.matrix).include }}

    steps:
      - if: matrix.pkg.name == '__skip__'
        run: echo "Nothing to publish." && exit 0

      - name: Download wheels for ${{ matrix.pkg.name }}
        uses: actions/download-artifact@v8
        continue-on-error: true
        with:
          path: dist/
          pattern: ${{ matrix.pkg.name }}-${{ matrix.pkg.version }}-android-*
          merge-multiple: true

      - name: Check package artifact availability
        id: package-artifacts
        shell: bash
        run: |
          if compgen -G "dist/*.whl" > /dev/null; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "No wheel artifacts found for ${{ matrix.pkg.name }}-${{ matrix.pkg.version }}; skipping publish."
          fi

      - name: Create GitHub Release
        if: steps.package-artifacts.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PKG="${{ matrix.pkg.name }}"
          VER="${{ matrix.pkg.version }}"
          TAG="${{ matrix.pkg.tag }}"

          # Parse built wheel files to determine wheel type and python versions
          WHEEL_TYPES=()
          PY_VERSIONS=""
          
          py_tags=$(for f in dist/*.whl; do basename "$f" | rev | cut -d'-' -f3 | rev; done | sort -u)
          abi_tags=$(for f in dist/*.whl; do basename "$f" | rev | cut -d'-' -f2 | rev; done | sort -u)
          
          if echo "$abi_tags" | grep -q "abi3"; then
             WHEEL_TYPES+=("Stable ABI")
          fi
          if echo "$abi_tags" | grep -q "^cp"; then
             WHEEL_TYPES+=("CPython normal")
          fi
          
          WHEEL_TYPE_STR=$(IFS=", "; echo "${WHEEL_TYPES[*]}")
          
          cp_versions=$(echo "$py_tags" | grep -o 'cp3[0-9]*' | sed 's/cp3/3./' | sort -uV | paste -sd ", " || true)
          if [ -n "$cp_versions" ]; then
             PY_VERSIONS="$cp_versions"
             if echo "$abi_tags" | grep -q "abi3"; then
                PY_VERSIONS="${PY_VERSIONS}+"
             fi
          else
             PY_VERSIONS="Unknown"
          fi

          BODY="| ABI | Target |
          |---|---|
          | \`arm64_v8a\` | Physical devices (Android 7+, API 24) |
          | \`x86_64\`    | Emulators |

          **Wheel Type:** ${WHEEL_TYPE_STR:-Unknown}
          **Python:** ${PY_VERSIONS}

          Built from PyPI sdist by GitHub Actions.
          "

          gh release create "$TAG" dist/*.whl \
            --repo "$GITHUB_REPOSITORY" \
            --title "${PKG} ${VER} — Android wheels" \
            --notes "$BODY" \
          || gh release upload "$TAG" dist/*.whl \
            --repo "$GITHUB_REPOSITORY" \
            --clobber
