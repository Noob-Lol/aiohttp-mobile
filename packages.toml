# packages.toml
# Packages to build Android wheels for, checked daily against PyPI.
#
# Fields:
#   name              – PyPI package name (required)
#   pin               – lock to a specific version; omit to always build latest
#   cibw_environment  – extra env vars for CIBW_ENVIRONMENT_ANDROID (optional)
#   cibw_before_build – commands to run before building via CIBW_BEFORE_BUILD_ANDROID (optional)
#   patch             – arbitrary commands before the "before build" if it's too late

# aiohttp + deps
[[package]]
name = "aiohttp"

[[package]]
name = "frozenlist"

[[package]]
name = "multidict"

[[package]]
name = "propcache"

[[package]]
name = "yarl"

# aio speed
[[package]]
name = "pycares"

[[package]]
name = "brotli"

# niquests compiled <3
[[package]]
name = "charset_normalizer"
cibw_environment = { PIP_NO_BINARY = "mypy", CHARSET_NORMALIZER_USE_MYPYC = "1" }

[[package]]
name = "jh2"
cibw_environment = { MATURIN_PEP517_ARGS = "--features pyo3/extension-module --features pyo3/generate-import-lib" }
patch = "sed -i 's/\"abi3-py37\", //' {project}/Cargo.toml"

[[package]]
name = "qh3"
cibw_environment = { MATURIN_PEP517_ARGS = "--features pyo3/extension-module --features pyo3/generate-import-lib", BINDGEN_EXTRA_CLANG_ARGS="--sysroot=$ANDROID_NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot" }
cibw_before_build = "rm -rf {package}/target/*/release/build/aws-lc-sys-*"
patch = "sed -i 's/\"abi3-py37\", //' {project}/Cargo.toml"

# speedups
[[package]]
name = "orjson"

# other
# [[package]]
# name = "uvloop"
# fix env

[[package]]
name = "psutil"
patch = "sed -i 's/sys.platform.startswith(\"linux\")/sys.platform.startswith((\"linux\", \"android\"))/g' {project}/psutil/_common.py"

[[package]]
name = "msgspec"

[[package]]
name = "websockets"

[[package]]
name = "pydantic_core"

[[package]]
name = "watchfiles"

#[[package]]
#name = "cffi"

#[[package]]
#name = "numpy"

[[package]]
name = "jiter"

[[package]]
name = "hiredis"

[[package]]
name = "pymongo"

[[package]]
name = "lxml"
cibw_before_build = "mkdir -p /system/bin && ln -sf /bin/sh /system/bin/sh"
