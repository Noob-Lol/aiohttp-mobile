# packages.toml
# Packages to build Android wheels for, checked daily against PyPI.
#
# Fields:
#   name              – PyPI package name (required)
#   pin               – lock to a specific version; omit to always build latest
#   cibw_environment  – extra env vars for CIBW_ENVIRONMENT_ANDROID (optional)
#   cibw_before_build – commands to run before building via CIBW_BEFORE_BUILD_ANDROID (optional)

# aiohttp
[[package]]
name = "frozenlist"

[[package]]
name = "multidict"

[[package]]
name = "propcache"

[[package]]
name = "yarl"

[[package]]
name = "aiohttp"

# other
[[package]]
name = "orjson"

# [[package]]
# name = "uvloop"
# fix env

[[package]]
name = "psutil"
cibw_before_build = "python -c 'import pathlib;q=chr(34);f=pathlib.Path(\"{package}/psutil/_common.py\");t=f.read_text();f.write_text(t.replace(f\"startswith({q}linux{q})\",f\"startswith(({q}linux{q}, {q}android{q}))\"))'"

[[package]]
name = "msgspec"

[[package]]
name = "websockets"

[[package]]
name = "pydantic_core"

[[package]]
name = "watchfiles"
